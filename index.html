  <body>
    <canvas id="loadingCanvas" oncontextmenu="event.preventDefault()"></canvas>
    <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

    <script type='text/javascript'>
      function goFullScreen(){
            var canvas = document.getElementById("canvas");
            if(canvas.requestFullScreen)
                canvas.requestFullScreen();
            else if(canvas.webkitRequestFullScreen)
                canvas.webkitRequestFullScreen();
            else if(canvas.mozRequestFullScreen)
                canvas.mozRequestFullScreen();
      }
      function FullScreenHook(){
        var canvas = document.getElementById("canvas");
        var loadingCanvas = document.getElementById("loadingCanvas");
        var width = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
        var height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
        canvas.width = width;
        canvas.height = height;
        loadingCanvas.width = width;
        loadingCanvas.height = height;
      }
      
      // Make fullscreen on resize
      window.addEventListener('resize', function() {
        FullScreenHook();
        if (loadingContext) {
          var loadingCanvas = document.getElementById('loadingCanvas');
          loadingCanvas.width = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
          loadingCanvas.height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
        }
      });
      var loadingContext = null;
      function initLoadingCanvas() {
        var loadingCanvas = document.getElementById('loadingCanvas');
        loadingCanvas.width = window.innerWidth || document.documentElement.clientWidth || document.body.clientWidth;
        loadingCanvas.height = window.innerHeight || document.documentElement.clientHeight || document.body.clientHeight;
        loadingContext = loadingCanvas.getContext('2d');
      }
      function drawLoadingText(text) {
        if (!loadingContext) initLoadingCanvas();
        var canvas = loadingContext.canvas;

        loadingContext.fillStyle = "#000";
        loadingContext.fillRect(0, 0, canvas.width, canvas.height);

        loadingContext.font = '2em arial';
        loadingContext.textAlign = 'center'
        loadingContext.fillStyle = "#fff";
        loadingContext.fillText(text, canvas.width / 2, canvas.height / 2);
      }
      
      // Initialize loading canvas on load
      window.addEventListener('load', function() {
        initLoadingCanvas();
        FullScreenHook();
      });

      window.onload = function () { window.focus(); };
      window.onclick = function () { window.focus(); };

      window.addEventListener("keydown", function(e) {
        // space and arrow keys
        if([32, 37, 38, 39, 40].indexOf(e.keyCode) > -1) {
          e.preventDefault();
        }
      }, false);

      var Module = {
        arguments: ["./game.love"],
        INITIAL_MEMORY: 209715200,
        locateFile: function(path) {
          if (path.endsWith('.wasm')) {
            return './love.wasm';
          }
          return path;
        },
        printErr: console.error.bind(console),
        canvas: (function() {
          var canvas = document.getElementById('canvas');

          // As a default initial behavior, pop up an alert when webgl context is lost. To make your
          // application robust, you may want to override this behavior before shipping!
          // See http://www.khronos.org/registry/webgl/specs/latest/1.0/#5.15.2
          canvas.addEventListener("webglcontextlost", function(e) { alert('WebGL context lost. You will need to reload the page.'); e.preventDefault(); }, false);

          return canvas;
        })(),
        setStatus: function(text) {
          if (text) {
            drawLoadingText(text);
          } else if (Module.remainingDependencies === 0) {
            document.getElementById('loadingCanvas').style.display = 'none';
            document.getElementById('canvas').style.visibility = 'visible';
            FullScreenHook();
          }
        },
        totalDependencies: 0,
        remainingDependencies: 0,
        monitorRunDependencies: function(left) {
          this.remainingDependencies = left;
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies-left) + '/' + this.totalDependencies + ')' : 'All downloads complete.');
        }
      };
      Module.setStatus('Downloading...');

      // Handle #redeem hash with a custom overlay popup before starting the game
      function handleRedeemIfNeeded(startGame) {
        if (window.location.hash !== '#redeem') {
          startGame();
          return;
        }

        var overlay = document.getElementById('redeemOverlay');
        var input = document.getElementById('redeemInput');
        var msg = document.getElementById('redeemMessage');
        var btnRedeem = document.getElementById('redeemSubmit');
        var btnCancel = document.getElementById('redeemCancel');

        if (!overlay || !input || !msg || !btnRedeem || !btnCancel) {
          // Fallback: just start the game if overlay is missing
          startGame();
          return;
        }

        overlay.style.display = 'flex';
        input.value = '';
        msg.textContent = '';
        msg.style.color = '#ffd76a';
        input.focus();

        function finish() {
          overlay.style.display = 'none';
          window.location.hash = '';
          history.replaceState(null, '', window.location.pathname + window.location.search);
          cleanup();
          startGame();
        }

        function applyCode(code) {
          code = (code || '').trim();
          if (!code) {
            msg.textContent = 'Please enter a code.';
            msg.style.color = '#ff8080';
            return;
          }

          // Collect redeem flags that will be passed as command-line args to Love
          if (!Module.redeemArgs) Module.redeemArgs = [];
          var ok = false;
          if (code === '645873FS68S7A') {
            Module.redeemArgs.push('--ul');
            msg.textContent = 'Unlimited Lives unlocked!';
            ok = true;
          } else if (code === '839204KD57P1X') {
            Module.redeemArgs.push('--uh');
            msg.textContent = 'Unlimited Hints unlocked!';
            ok = true;
          } else if (code === '560738RT29C4B') {
            Module.redeemArgs.push('--ua');
            msg.textContent = 'Unlock Everything activated!';
            ok = true;
          } else {
            msg.textContent = 'Invalid code. Please try again.';
            msg.style.color = '#ff8080';
          }

          if (ok) {
            msg.style.color = '#7CFF9C';
            setTimeout(finish, 700);
          }
        }

        function onRedeemClick(e) {
          e.preventDefault();
          applyCode(input.value);
        }

        function onCancelClick(e) {
          e.preventDefault();
          finish();
        }

        function onKeyDown(e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            applyCode(input.value);
          } else if (e.key === 'Escape') {
            e.preventDefault();
            finish();
          }
        }

        function cleanup() {
          btnRedeem.removeEventListener('click', onRedeemClick);
          btnCancel.removeEventListener('click', onCancelClick);
          input.removeEventListener('keydown', onKeyDown);
        }

        btnRedeem.addEventListener('click', onRedeemClick);
        btnCancel.addEventListener('click', onCancelClick);
        input.addEventListener('keydown', onKeyDown);
      }

      window.onerror = function(event) {
        // TODO: do not warn on ok events like simulating an infinite loop or exitStatus
        Module.setStatus('Exception thrown, see JavaScript console');
        Module.setStatus = function(text) {
          if (text) Module.printErr('[post-exception status] ' + text);
        };
      };

      var applicationLoad = function(e) {
        handleRedeemIfNeeded(function() {
          // Apply any redeem flags as extra Love arguments
          if (Array.isArray(Module.redeemArgs) && Module.redeemArgs.length) {
            Module.arguments = ["./game.love"].concat(Module.redeemArgs);
          }
          Love(Module);
        });
      }
    </script>

    <!-- Redeem activation code overlay -->
    <div id="redeemOverlay" style="position:fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.85); z-index:10;">
      <div style="background:#1c2640; border-radius:18px; padding:24px 28px 20px; width:min(420px, 90%); box-shadow:0 18px 50px rgba(0,0,0,0.6); border:2px solid rgba(255,255,255,0.08); font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color:#fff;">
        <div style="font-size:20px; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; text-align:center; margin-bottom:10px;">Enter Activation Code</div>
        <div style="font-size:13px; opacity:0.85; text-align:center; margin-bottom:16px;">Paste the code you received after purchase.</div>
        <input id="redeemInput" type="text" autocomplete="off"
               style="width:100%; box-sizing:border-box; padding:10px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.15); background:#101729; color:#fff; font-size:14px; outline:none;">
        <div id="redeemMessage" style="margin-top:10px; font-size:12px; text-align:center; color:#ffd76a; min-height:16px;"></div>
        <div style="margin-top:18px; display:flex; justify-content:flex-end; gap:10px;">
          <button id="redeemCancel" style="padding:8px 16px; border-radius:999px; border:none; background:#394563; color:#fff; font-weight:600; cursor:pointer;">Cancel</button>
          <button id="redeemSubmit" style="padding:8px 18px; border-radius:999px; border:none; background:#4ce28a; color:#0b1a26; font-weight:700; cursor:pointer;">Redeem</button>
        </div>
      </div>
    </div>
